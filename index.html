<!DOCTYPE html>
<html>
<head>
    <title>Career Predictor</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">

    <h2 class="mb-4">Career Recommendation System</h2>

    <form action="/predict" method="POST">
        {% for col in columns %}
        <div class="mb-3">
            <label for="{{ col }}" class="form-label">{{ col.replace('_', ' ').title() }} (1-5)</label>
            <input type="range" class="form-range" min="1" max="5" value="3" name="{{ col }}" id="{{ col }}" oninput="this.nextElementSibling.value = this.value">
            <output>3</output>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Predict Career</button>
    </form>

    {% if prediction %}
    <div class="alert alert-success mt-4" role="alert">
        <h4 class="alert-heading">Recommended Career:</h4>
        <p>{{ prediction }}</p>
    </div>
    {% endif %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
